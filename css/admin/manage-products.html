<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Manage Products</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Poppins;
background:#f5f5f5;
}

.admin-products{
max-width:900px;
margin:40px auto;
display:flex;
flex-direction:column;
gap:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.add-btn{
background:black;
color:white;
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
}

.product-row{
display:flex;
align-items:center;
gap:20px;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.product-row img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
}

.product-info{
flex:1;
}

.product-info p{
margin:3px 0;
font-size:14px;
color:#666;
}

.product-actions button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:5px;
}

.edit-btn{
background:#222;
color:white;
}

.delete-btn{
background:#e74c3c;
color:white;
}

</style>

</head>

<body>

<div class="admin-products">

<div class="header">
<h2>Manage Products</h2>

<button class="add-btn" onclick="goAddProduct()">
+ Add Product
</button>

</div>

<div id="productsList"></div>

</div>

<script type="module">

import { auth } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const ADMIN_EMAIL = "admineloura@gmail.com";

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="../login.html";
return;
}

if(user.email.toLowerCase()!==ADMIN_EMAIL.toLowerCase()){
window.location.href="../index.html";
}

});

const SUPABASE_URL="https://thgveowwxdjcvisofske.supabase.co";
const SUPABASE_KEY="sb_publishable_JN8qHQVTWOLNtRzsTLHT1g_AMKIzfMm";

const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const BUCKET="product-images";

function getImageUrl(file){
return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${file}`;
}

async function loadProducts(){

const {data,error}=await supabase
.from("products")
.select("*")
.order("created_at",{ascending:false});

const container=document.getElementById("productsList");

container.innerHTML="";

data.forEach(product=>{

container.innerHTML+=`

<div class="product-row">

<img src="${getImageUrl(product.image_path)}">

<div class="product-info">

<h4>${product.name}</h4>

<p><b>Price:</b> ₹${product.price}</p>

<p><b>Category:</b> ${product.category}</p>

<p>${product.description || ""}</p>

</div>

<div class="product-actions">

<button class="edit-btn" onclick="editProduct('${product.id}')">
Edit
</button>

<button class="delete-btn" onclick="deleteProduct('${product.id}')">
Delete
</button>

</div>

</div>

`;

});

}

async function deleteProduct(id){

if(!confirm("Delete this product?")) return;

await supabase
.from("products")
.delete()
.eq("id",id);

loadProducts();

}

function editProduct(id){
window.location.href=`edit-product.html?id=${id}`;
}

function goAddProduct(){
window.location.href="add-products.html";
}

window.deleteProduct=deleteProduct;
window.editProduct=editProduct;
window.goAddProduct=goAddProduct;

loadProducts();

</script>

</body>
</html>
